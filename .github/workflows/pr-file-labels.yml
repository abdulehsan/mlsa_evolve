name: PR File Labels

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  add-file-type-labels:
    runs-on: ubuntu-latest

    steps:
      - name: Detect changed file types
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            html:
              - '**/*.html'
            css:
              - '**/*.css'

      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'html', color: '0e8a16', description: 'Changes include HTML files' },
              { name: 'css', color: '1d76db', description: 'Changes include CSS files' }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label
                  });
                } else {
                  throw error;
                }
              }
            }

      - name: Apply labels to PR
        if: steps.changes.outputs.html == 'true' || steps.changes.outputs.css == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [];

            if ('${{ steps.changes.outputs.html }}' === 'true') {
              labels.push('html');
            }

            if ('${{ steps.changes.outputs.css }}' === 'true') {
              labels.push('css');
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels
              });
            }
